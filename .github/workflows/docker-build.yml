name: Docker Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configuracion de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construccion con docker/build-push-action
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rpg-name-generator:test
