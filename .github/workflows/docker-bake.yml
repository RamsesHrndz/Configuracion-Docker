name: Docker Bake Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configuracion de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bake con docker/bake-action
        uses: docker/bake-action@v6
        with:
          files: ./docker-bake.hcl
          push: false
          load: true

      - name: Verify image exists
        run: docker image ls rpg-name-generator:bake-test
